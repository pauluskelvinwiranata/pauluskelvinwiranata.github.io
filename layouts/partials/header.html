{{/* Header */}}

<div class="header">
  <div class="header-content">
    <h1 class="header-title">{{ site.Title }}</h1>
    <button id="theme-toggle">
      <img
        id="theme-icon"
        src="https://img.icons8.com/ios-filled/50/FFBF00/sun.png"
        alt="Toggle Theme"
        width="24"
        height="24"
      />
    </button>
  </div>

  <div class="menu">
    {{ $currentPage := . }} {{ with site.Params.menu }} {{ range . }}
    <p class="small {{ if eq .url $currentPage.Path }} bold {{end}}">
      <a href="{{.url}}" class="menu-link"> {{.name }} </a>
    </p>
    {{ end }} {{ end }}
  </div>
</div>

<script>
  const themeToggle = document.getElementById("theme-toggle");
  const themeIcon = document.getElementById("theme-icon");

  function toggleTheme() {
    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {
      themeIcon.src =
        "https://img.icons8.com/ios-filled/50/FFD700/crescent-moon.png";
      localStorage.setItem("theme", "dark");
    } else {
      themeIcon.src = "https://img.icons8.com/ios-filled/50/FFD700/sun.png";
      localStorage.setItem("theme", "light");
    }
  }

  themeToggle.addEventListener("click", toggleTheme);

  document.addEventListener("DOMContentLoaded", function () {
    const savedTheme = localStorage.getItem("theme");
    if (savedTheme === "dark") {
      document.body.classList.add("dark");
      themeIcon.src =
        "https://img.icons8.com/ios-filled/50/FFD700/crescent-moon.png";
    } else {
      themeIcon.src = "https://img.icons8.com/ios-filled/50/FFD700/sun.png";
    }
  });
</script>
